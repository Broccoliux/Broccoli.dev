<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">   
    <title>Broccoli Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
    <style>
        * {
            margin: 0;
            padding: 0;

        }

        body {
            background-color: #000000fd;
            color: #ffffff;
            font-family: 'Roboto', sans-serif;
        }

        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 70px;
            background-color: #020714;
        }

        nav ul {
            display: flex;
            justify-content: center;
        }

        nav ul li {
            list-style: none;
            margin: 0 23px;
            
        }

        nav ul li a{
            text-decoration: none;
            color: #ffffff;
            
        }

        nav ul li a:hover{
            color: #26ce17;
            font-size: 1.04rem;
            
        }

        .left {
            font-size: 1.5rem;
        }

        .firstSection{                    
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 60px 0;
               
        }

        .firstSection > div{
            width: 34%;
        }

        .leftSection{
            font-size: 3rem;

        }

        .rightSection img {
            max-width: 100%;
            height: auto;
            display: block;
            
        }
        .green {
            color: #26da0e;
        }

        .Broccoli portfolio{
            color: #0E6E38;
        }

        #element {
            color: #26da0e;
        }

        .secondSection{
            max-width: 83vw;
            margin: 0 auto;
        }

    </style>
</head>

<body>
    <header>
        <nav>
            <div class="left"> <span class= "green">Broccoli🥦portfolio</span> </div>
            
            <ul>
                <li><a href="/home">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/services">Services</a></li>
                <li><a href="/projects">Projects</a></li>
                <li><a href="/contact">Contact Me</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="firstSection">
            <div class="leftSection">
                Yo, my name is <span class= "green">Broccoli</span>
                
                <div>I am really good at:</div>
                <span id="element"></span>
                
            </div>
            <div class="rightSection">
                <img src="img assets/broccoli.png" alt="Broccoli Image">
            </div>
        </section>

        <section class="secondSection">
            <h1>What i have done?</h1>
    </main>
    <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>
    <!-- Setup and start animation! -->
  <script>
    var typed = new Typed('#element', {
      strings: ['AI/ML Engineer', 'IOT Engineer.','Embedded systems developer.'],
      typeSpeed: 50,
    });
  </script>
</body>

</html>
