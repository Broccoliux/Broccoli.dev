<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broccoli Portfolio</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <main>
        <!-- hero -->

        <section class="hero" id="home">
            <div class="hero-left">

                <h1>
                    Yo, my name is
                    <span class="green">
                        Broccoli
                    </span>
                </h1>

                <h2>
                    I am really good at
                </h2>

                <div class="typed-wrapper">
                    <span id="element"></span>
                </div>
            </div>

            <div class="hero-right">
                <img src="img_assets/lost in the space.png">
            </div>

        </section>
        <hr>

        <!-- about -->

        <section id="about" class="section">

            <h2>About</h2>

            <p>

                Write your introduction here.

            </p>

            <br>

        </section>

        <!-- ================= EXPERIENCE ================= -->

        <section id="experience" class="section">

            <h2>Experience</h2>

            <p>

                Your work experience.

            </p>

        </section>

        <!-- ================= PROJECTS ================= -->

        <section id="projects" class="section">

            <h2>Projects</h2>

        </section>

        <!-- ================= TECH STACK ================= -->

        <section id="TECH STACK" class="section">

            <h2>TECH STACK</h2>

            <p>
                My Tech Stack
            </p>

        </section>

        <!-- ================= SKILLS ================= -->

        <section id="skills" class="section">

            <h2>Skills</h2>

            <p>
                Skills
            </p>

        </section>

        <!-- ================= CONTACT ================= -->

        <section id="contact" class="section">

            <h2>Contact</h2>

            <p>
                Skills
            </p>

        </section>

    </main>

    <!-- ===================== DOCK ===================== -->

    <div class="dock-wrapper">

        <div id="dock" class="dock">

            <!-- Home -->

            <button class="dock-item active" data-section="home">

                <span class="tooltip">

                    Home

                </span>

                <div class="dock-icon">

                    <!-- SVG comes next -->

                </div>

                <div class="active-dot"></div>

            </button>

            <!-- About -->

            <button class="dock-item" data-section="about">

                <span class="tooltip">

                    About

                </span>

                <div class="dock-icon"></div>

            </button>

            <!-- Experience -->

            <button class="dock-item" data-section="experience">

                <span class="tooltip">

                    Experience

                </span>

                <div class="dock-icon"></div>

            </button>

            <!-- Projects -->

            <button class="dock-item" data-section="projects">

                <span class="tooltip">

                    Projects

                </span>

                <div class="dock-icon"></div>

            </button>

            <!-- Skills -->

            <button class="dock-item" data-section="skills">

                <span class="tooltip">

                    Skills

                </span>

                <div class="dock-icon"></div>

            </button>

            <!-- Contact -->

            <button class="dock-item" data-section="contact">

                <span class="tooltip">

                    Contact

                </span>

                <div class="dock-icon"></div>

            </button>

        </div>

    </div>

    <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>

    <script src="JS/main.js"></script>

</body>

</html>
