<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">   
    <title>Broccoli Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
    <style>
        * {
            margin: 0;
            padding: 0;

        }

        body {
            background-color: #0b2472fd;
            color: #ffffff;
            font-family: 'Roboto', sans-serif;
        }

        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 70px;
            background-color: #0c3ec9;
        }

        nav ul {
            display: flex;
            justify-content: center;
        }

        nav ul li {
            list-style: none;
            margin: 0 23px;
            font-size: 1.2rem;

        }

        .left {
            font-size: 1.5rem;
        }

        .firstSection{                    
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 60px 0;
               
        }

        .firstSection > div{
            width: 34%;
        }

        .leftSection{
            font-size: 3rem;
            width: 100%;
            padding: 23px;
        }

        .rightSection img {
            max-width: 100%;
            height: auto;
            display: block;
            
        }
        .green {
            color: #26da0e;
        }

        .Broccoli portfolio{
            color: #0E6E38;
        }

    </style>
</head>

<body>
    <header>
        <nav>
            <div class="left"> <span class= "green">Broccoli🥦portfolio</span> </div>
            
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Services</li>
                <li>Projects</li>
                <li>Contact Me</li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="firstSection">
            <div class="leftSection">
                Hi, my name is <span class= "green">Broccoli</span>
                <hr>
                <div>
                    you can call me broc, <hr> if you dont like broccoli. 
                    <hr>
                </div>
            </div>
            <div class="rightSection">
                <img src="img assets/broccoli.png" alt="Broccoli Image">
            </div>
        </section>
    </main>
</body>

</html>
